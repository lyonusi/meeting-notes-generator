[pytest]
# Config for the live-transcription web UI backend test suite.
# rootdir is webapp/backend; add the project root (two levels up) to sys.path
# so tests can import both `webapp.backend.*` and the existing top-level modules
# (transcription, notes_generator, version_manager, aws_services, ...).
pythonpath = ../..
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Enable pytest-asyncio for async session/WebSocket tests in later tasks.
asyncio_mode = auto
